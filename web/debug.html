<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenWebAI 调试面板</title>
<script src="/marked.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:#0f0f13; color:#e0e0e0; height:100vh; display:flex; flex-direction:column; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }

/* 顶栏 */
.topbar { display:flex; align-items:center; gap:12px; padding:10px 16px; background:#1a1a24; border-bottom:1px solid #2a2a3a; flex-shrink:0; }
.topbar h1 { font-size:15px; color:#a78bfa; font-weight:600; }
.topbar .back { color:#888; text-decoration:none; font-size:13px; }
.topbar .back:hover { color:#a78bfa; }
.badge { font-size:12px; padding:2px 10px; border-radius:10px; background:#1e1e30; color:#7c3aed; border:1px solid #3b2f6e; }

/* 主体布局 */
.main { display:flex; flex:1; overflow:hidden; gap:0; }

/* 左栏：聊天 */
.panel-chat { display:flex; flex-direction:column; width:950px; flex-shrink:0; border-right:1px solid #2a2a3a; }
.panel-title { padding:8px 14px; font-size:13px; color:#888; border-bottom:1px solid #1e1e2e; text-transform:uppercase; letter-spacing:.5px; display:flex; align-items:center; justify-content:space-between; }
.panel-title .clear-btn { font-size:12px; color:#555; cursor:pointer; background:none; border:none; }
.panel-title .clear-btn:hover { color:#a78bfa; }

.chat-messages { flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:6px; }
.msg { padding:8px 10px; border-radius:6px; font-size:14px; line-height:1.5; word-break:break-word; }
.msg.user { background:#1e1a3a; color:#c084fc; border-left:3px solid #7c3aed; white-space:pre-wrap; }
.msg.assistant { background:#162016; color:#4ade80; border-left:3px solid #16a34a; }
.msg.error { background:#200d0d; color:#f87171; border-left:3px solid #dc2626; white-space:pre-wrap; }
.msg.system { background:#141414; color:#777; font-size:12px; text-align:center; border:1px dashed #2a2a3a; }
/* Markdown styles for assistant messages */
.msg.assistant h1,.msg.assistant h2,.msg.assistant h3,.msg.assistant h4 { color:#86efac; margin:12px 0 6px; font-size:15px; }
.msg.assistant h1 { font-size:17px; } .msg.assistant h2 { font-size:16px; }
.msg.assistant p { margin:6px 0; } .msg.assistant ul,.msg.assistant ol { margin:6px 0 6px 20px; }
.msg.assistant li { margin:2px 0; }
.msg.assistant code { background:#0d1a0d; padding:1px 5px; border-radius:3px; color:#a7f3d0; font-size:13px; font-family:'Cascadia Code','Fira Code',monospace; }
.msg.assistant pre { background:#0a0f0a; border:1px solid #1a3a1a; border-radius:5px; padding:10px; overflow-x:auto; margin:8px 0; }
.msg.assistant pre code { background:none; padding:0; color:#86efac; }
.msg.assistant blockquote { border-left:3px solid #2a5a2a; padding-left:12px; color:#6ee7b7; margin:8px 0; }
.msg.assistant a { color:#60a5fa; text-decoration:underline; }
.msg.assistant table { border-collapse:collapse; margin:8px 0; } .msg.assistant th,.msg.assistant td { border:1px solid #2a3a2a; padding:4px 10px; font-size:13px; }
.msg.assistant hr { border:none; border-top:1px solid #2a3a2a; margin:12px 0; }
.msg.assistant strong { color:#bbf7d0; }
.msg.streaming::after { content:'▌'; color:#4ade80; animation:blink 0.8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.input-row { display:flex; gap:6px; padding:10px; border-top:1px solid #2a2a3a; flex-shrink:0; }
.input-row input { flex:1; padding:8px 10px; background:#1a1a2e; border:1px solid #2a2a3a; border-radius:5px; color:#fff; font-size:14px; outline:none; }
.input-row input:focus { border-color:#6366f1; }
.input-row button { padding:8px 14px; background:#6366f1; border:none; border-radius:5px; color:#fff; cursor:pointer; font-size:14px; white-space:nowrap; }
.input-row button:disabled { opacity:.4; cursor:not-allowed; }

/* 右栏：调试日志 */
.panel-debug { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
.debug-tabs { display:flex; border-bottom:1px solid #2a2a3a; flex-shrink:0; }
.tab { padding:8px 18px; font-size:13px; color:#777; cursor:pointer; border-bottom:2px solid transparent; }
.tab.active { color:#a78bfa; border-bottom-color:#7c3aed; }
.tab:hover:not(.active) { color:#bbb; }

.tab-content { display:none; padding:10px; font-family:monospace; font-size:13px; line-height:1.6; }
.tab-content.active { display:flex; flex-direction:column; flex:1; min-height:0; overflow-y:auto; }
#tab-sse > div, #tab-raw > div, #tab-stats > div { flex:none; }

/* SSE 日志 */
.sse-line { padding:3px 8px; border-radius:3px; margin:1px 0; font-size:13px; font-family:'Cascadia Code','Fira Code',Consolas,monospace; }
.sse-line.f1 { color:#4ade80; font-weight:600; }
.sse-line.f2 { color:#60a5fa; font-weight:600; }
.sse-line.f3 { color:#fbbf24; font-weight:600; }
.sse-line.f4 { color:#c084fc; font-weight:600; }
.sse-line.unknown { color:#f59e0b; background:#1e1800; }
.sse-line.error { color:#f87171; background:#1a0000; }
.sse-line.raw { color:#7a7aaa; }
.sse-line.done { color:#22d3ee; font-weight:bold; }
.sse-line.session { color:#a1a1aa; border-top:1px solid #2a2a3a; padding-top:6px; margin-top:4px; font-weight:500; }

/* 状态卡片 */
.stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px; }
.stat-card { background:#1a1a24; border:1px solid #2a2a3a; border-radius:6px; padding:12px; }
.stat-card .label { font-size:12px; color:#888; margin-bottom:4px; }
.stat-card .value { font-size:22px; font-weight:bold; color:#a78bfa; line-height:1.2; }

/* 原始数据 */
.raw-block { background:#0a0a0f; border:1px solid #2a2a3a; border-radius:4px; padding:10px; margin:4px 0; white-space:pre-wrap; word-break:break-all; color:#9a9aaa; font-size:13px; line-height:1.5; }
.raw-block.highlight { color:#c0c0d0; border-color:#4a4a6a; }

#statsLog { color:#888; font-size:13px; margin-top:8px; }

/* 自动滚动 */
.autoscroll-toggle { font-size:12px; color:#777; cursor:pointer; user-select:none; }
.autoscroll-toggle.on { color:#4ade80; }

/* 滚动条 */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:#111; }
::-webkit-scrollbar-thumb { background:#333; border-radius:3px; }
</style>
</head>
<body>

<div class="topbar">
  <a class="back" href="/">← 返回主页</a>
  <h1>🔍 调试面板</h1>
  <span class="badge" id="statusBadge">等待连接</span>
  <div style="flex:1"></div>
  <span class="autoscroll-toggle on" id="autoScrollToggle" onclick="toggleAutoScroll()">自动滚动 ✓</span>
</div>

<div class="main">
  <!-- 左栏：聊天测试 -->
  <div class="panel-chat">
    <div class="panel-title">
      聊天测试
      <button class="clear-btn" onclick="clearChat()">清空</button>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="msg system">发送消息开始调试</div>
    </div>
    <div class="input-row">
      <input id="chatInput" placeholder="输入消息..." />
      <button id="sendBtn" onclick="sendMessage()">发送</button>
    </div>
  </div>

  <!-- 右栏：调试日志 -->
  <div class="panel-debug">
    <div class="debug-tabs">
      <div class="tab active" onclick="switchTab('sse')">SSE 数据流</div>
      <div class="tab" onclick="switchTab('stats')">统计</div>
      <div class="tab" onclick="switchTab('raw')">原始数据</div>
    </div>

    <!-- SSE 日志 -->
    <div class="tab-content active" id="tab-sse">
      <div id="sseLog"></div>
    </div>

    <!-- 统计 -->
    <div class="tab-content" id="tab-stats">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="label">请求次数</div>
          <div class="value" id="stat-requests">0</div>
        </div>
        <div class="stat-card">
          <div class="label">SSE chunks</div>
          <div class="value" id="stat-chunks">0</div>
        </div>
        <div class="stat-card">
          <div class="label">解析字符数</div>
          <div class="value" id="stat-chars">0</div>
        </div>
        <div class="stat-card">
          <div class="label">Format 1 (简单token)</div>
          <div class="value" id="stat-f1">0</div>
        </div>
        <div class="stat-card">
          <div class="label">Format 2 (APPEND)</div>
          <div class="value" id="stat-f2">0</div>
        </div>
        <div class="stat-card">
          <div class="label">Format 3 (BATCH)</div>
          <div class="value" id="stat-f3">0</div>
        </div>
        <div class="stat-card">
          <div class="label">Format 4 (完整对象)</div>
          <div class="value" id="stat-f4">0</div>
        </div>
        <div class="stat-card">
          <div class="label">未知格式</div>
          <div class="value" id="stat-unknown">0</div>
        </div>
        <div class="stat-card">
          <div class="label">解析错误</div>
          <div class="value" id="stat-errors">0</div>
        </div>
      </div>
      <div id="statsLog" style="color:#555; font-size:12px;"></div>
    </div>

    <!-- 原始数据 -->
    <div class="tab-content" id="tab-raw">
      <div id="rawLog"></div>
    </div>
  </div>
</div>

<script>
const API_KEY = 'test123456'
let autoScroll = true
let isSending = false

// 统计
const stats = { requests: 0, chunks: 0, chars: 0, f1: 0, f2: 0, f3: 0, f4: 0, unknown: 0, errors: 0 }

function toggleAutoScroll() {
  autoScroll = !autoScroll
  const el = document.getElementById('autoScrollToggle')
  el.textContent = autoScroll ? '自动滚动 ✓' : '自动滚动'
  el.className = 'autoscroll-toggle' + (autoScroll ? ' on' : '')
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    const names = ['sse', 'stats', 'raw']
    t.className = 'tab' + (names[i] === name ? ' active' : '')
  })
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'))
  document.getElementById('tab-' + name).classList.add('active')
  // Auto-load raw log when switching to raw tab
  if (name === 'raw') fetchRawLog()
}

function scrollToBottom(id) {
  if (!autoScroll) return
  const el = document.getElementById(id)
  if (el) el.scrollTop = el.scrollHeight
}

function addSSELine(cls, text) {
  const MAX_LINES = 2000
  const log = document.getElementById('sseLog')
  while (log.childElementCount >= MAX_LINES) {
    log.firstElementChild?.remove()
  }
  const div = document.createElement('div')
  div.className = 'sse-line ' + cls
  div.textContent = text
  log.appendChild(div)
  scrollToBottom('tab-sse')
}

function addRawBlock(text, highlight) {
  const MAX_BLOCKS = 2000
  const log = document.getElementById('rawLog')
  while (log.childElementCount >= MAX_BLOCKS) {
    log.firstElementChild?.remove()
  }
  const div = document.createElement('div')
  div.className = 'raw-block' + (highlight ? ' highlight' : '')
  div.textContent = text
  log.appendChild(div)
  scrollToBottom('tab-raw')
}

function addChatMsg(role, text) {
  const MAX_MSGS = 500
  const container = document.getElementById('chatMessages')
  while (container.childElementCount >= MAX_MSGS) {
    container.firstElementChild?.remove()
  }
  const div = document.createElement('div')
  div.className = 'msg ' + role
  if (role === 'assistant') {
    div.innerHTML = renderMarkdown(text)
  } else {
    div.textContent = text
  }
  container.appendChild(div)
  container.scrollTop = container.scrollHeight
}

/** Render markdown text to HTML (uses marked.js if available, else fallback) */
function renderMarkdown(text) {
  if (typeof marked !== 'undefined') {
    return marked.parse(text, { breaks: true, gfm: true })
  }
  // Fallback: escape HTML + preserve whitespace
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')
}

/** Create a streaming assistant message div, returns { div, update, finalize } */
function createStreamingMsg() {
  const container = document.getElementById('chatMessages')
  const div = document.createElement('div')
  div.className = 'msg assistant streaming'
  div.innerHTML = '<span style="color:#555">thinking...</span>'
  container.appendChild(div)
  container.scrollTop = container.scrollHeight

  let accumulated = ''
  return {
    div,
    update(chunk) {
      accumulated += chunk
      div.innerHTML = renderMarkdown(accumulated)
      div.classList.add('streaming')
      if (autoScroll) container.scrollTop = container.scrollHeight
    },
    finalize() {
      div.classList.remove('streaming')
      if (accumulated) {
        div.innerHTML = renderMarkdown(accumulated)
      }
    },
    get content() { return accumulated }
  }
}

function clearChat() {
  document.getElementById('chatMessages').innerHTML = '<div class="msg system">已清空</div>'
}

function updateStats() {
  for (const [k, v] of Object.entries(stats)) {
    const el = document.getElementById('stat-' + k)
    if (el) el.textContent = v
  }
}

function updateStatusBadge(text, color) {
  const badge = document.getElementById('statusBadge')
  badge.textContent = text
  badge.style.background = color || '#1e1e30'
  badge.style.color = color ? '#fff' : '#7c3aed'
  badge.style.borderColor = color || '#3b2f6e'
}

// 解析 SSE 数据并记录到调试面板
function parseAndLogSSE(rawBody, reqIndex) {
  addSSELine('session', `━━━ 请求 #${reqIndex} SSE 解析开始 ━━━`)
  addRawBlock(`=== 请求 #${reqIndex} 原始数据 (${rawBody.length}b) ===\n` + rawBody, true)

  const lines = rawBody.split('\n')
  let accumulated = ''
  let lastFullContent = ''
  let chunkCount = 0

  for (const line of lines) {
    if (line.startsWith('data: ')) {
      const jsonStr = line.slice(6).trim()
      if (!jsonStr || jsonStr === '[DONE]') {
        if (jsonStr === '[DONE]') addSSELine('done', '→ [DONE]')
        continue
      }

      chunkCount++
      stats.chunks++

      try {
        const chunk = JSON.parse(jsonStr)
        const keys = Object.keys(chunk).join(',')

        // Format 1: {"v": "text"}
        if (typeof chunk.v === 'string') {
          accumulated += chunk.v
          stats.f1++
          addSSELine('f1', `[F1] v="${chunk.v.slice(0,50)}" → acc=${accumulated.length}`)
          continue
        }

        // Format 2: APPEND patch
        if (chunk.o === 'APPEND' && typeof chunk.v === 'string') {
          const p = String(chunk.p || '')
          stats.f2++
          const relevant = p.includes('content') || p.includes('fragment') || p === ''
          if (relevant) accumulated += chunk.v
          addSSELine('f2', `[F2] p="${p.slice(0,40)}" v="${chunk.v.slice(0,40)}" ${relevant ? '✓' : '(skip)'}`)
          continue
        }

        // Format 3: BATCH ops
        if (chunk.o === 'BATCH' && Array.isArray(chunk.v)) {
          stats.f3++
          let batchAdded = ''
          for (const op of chunk.v) {
            if (op.o === 'APPEND' && typeof op.v === 'string') {
              const p = String(op.p || '')
              if (p.includes('content') || p.includes('fragment') || p === '') {
                accumulated += op.v
                batchAdded += op.v
              }
            }
            // F3b: APPEND with fragment array
            if (op.o === 'APPEND' && Array.isArray(op.v)) {
              for (const frag of op.v) {
                if (frag && typeof frag === 'object' && frag.content) {
                  if (frag.content.length > lastFullContent.length) {
                    lastFullContent = frag.content
                    batchAdded += frag.content
                  }
                }
              }
            }
          }
          addSSELine('f3', `[F3] BATCH ops=${chunk.v.length} added="${batchAdded.slice(0,40)}" → acc=${accumulated.length}`)
          continue
        }

        // Format 4: full response object
        const fragments = chunk?.v?.response?.fragments
        if (fragments && Array.isArray(fragments)) {
          stats.f4++
          for (const f of fragments) {
            if ((f.type === 'RESPONSE' || f.type === 'TEXT') && f.content) {
              if (f.content.length > lastFullContent.length) {
                lastFullContent = f.content
              }
            }
          }
          const rc = chunk?.v?.response?.content
          if (rc && rc.length > lastFullContent.length) lastFullContent = rc
          addSSELine('f4', `[F4] fragments=${fragments.length} fullContent=${lastFullContent.length}`)
          continue
        }

        // OpenAI delta
        const delta = chunk?.choices?.[0]?.delta?.content
        if (delta) { accumulated += delta; addSSELine('f2', `[OpenAI delta] "${delta.slice(0,40)}"`); continue }
        if (typeof chunk.content === 'string') { accumulated += chunk.content; continue }

        // 未知
        stats.unknown++
        addSSELine('unknown', `[???] keys=${keys} json=${jsonStr.slice(0,100)}`)

      } catch (e) {
        stats.errors++
        addSSELine('error', `[ERR] ${e.message} | line="${line.slice(0,80)}"`)
      }
    }
  }

  const result = lastFullContent.length > accumulated.length ? lastFullContent : accumulated
  stats.chars += result.length
  addSSELine('done', `━━━ 解析完成: acc=${accumulated.length} full=${lastFullContent.length} → result=${result.length} chars ━━━`)
  if (result) addSSELine('done', `内容预览: "${result.slice(0, 150)}"`)

  updateStats()
  return result
}

async function sendMessage() {
  const input = document.getElementById('chatInput')
  const msg = input.value.trim()
  if (!msg || isSending) return

  input.value = ''
  addChatMsg('user', msg)
  isSending = true
  document.getElementById('sendBtn').disabled = true
  updateStatusBadge('Streaming...', '#7c3aed')

  stats.requests++
  const reqIndex = stats.requests

  addSSELine('session', `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`)
  addSSELine('session', `[${new Date().toLocaleTimeString()}] 请求 #${reqIndex} (stream): "${msg.slice(0,50)}"`)

  const streamMsg = createStreamingMsg()
  let fullContent = ''

  try {
    const resp = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + API_KEY,
      },
      body: JSON.stringify({
        model: 'deepseek',
        messages: [{ role: 'user', content: msg }],
        stream: true,
      }),
    })

    if (!resp.ok) {
      const errText = await resp.text()
      updateStatusBadge('请求失败', '#dc2626')
      addSSELine('error', `HTTP Error ${resp.status}: ${errText.slice(0, 200)}`)
      streamMsg.div.remove()
      addChatMsg('error', `HTTP ${resp.status}: ${errText.slice(0, 200)}`)
      return
    }

    // Read SSE stream
    const reader = resp.body.getReader()
    const decoder = new TextDecoder()
    let buffer = ''
    let chunkCount = 0
    let totalBytes = 0

    addSSELine('session', `━━━ 请求 #${reqIndex} SSE 流开始 ━━━`)
    console.log('[Debug] Stream reader started')

    while (true) {
      const { done, value } = await reader.read()
      if (done) {
        console.log('[Debug] Stream reader done, totalBytes=' + totalBytes + ' chunks=' + chunkCount)
        break
      }

      totalBytes += value.byteLength
      const text = decoder.decode(value, { stream: true })
      console.log('[Debug] Stream chunk: ' + text.length + ' chars, preview: ' + text.slice(0, 120))
      buffer += text

      const lines = buffer.split('\n')
      buffer = lines.pop() || ''

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue
        const jsonStr = line.slice(6).trim()
        if (!jsonStr || jsonStr === '[DONE]') {
          if (jsonStr === '[DONE]') addSSELine('done', '→ [DONE]')
          continue
        }

        chunkCount++
        stats.chunks++

        try {
          const chunk = JSON.parse(jsonStr)
          const delta = chunk?.choices?.[0]?.delta?.content
          if (delta) {
            fullContent += delta
            stats.chars += delta.length
            streamMsg.update(delta)
            if (chunkCount <= 5 || chunkCount % 20 === 0) {
              addSSELine('f2', `[Stream] chunk#${chunkCount} +${delta.length}字 → total=${fullContent.length}`)
            }
          }
          if (chunk?.choices?.[0]?.finish_reason) {
            addSSELine('done', `finish_reason: ${chunk.choices[0].finish_reason}`)
          }
        } catch (e) {
          stats.errors++
          addSSELine('error', `[ERR] ${e.message} | "${jsonStr.slice(0,80)}"`)
        }
      }
    }

    streamMsg.finalize()
    updateStats()
    console.log('[Debug] Stream finished: fullContent=' + fullContent.length + ' chars, chunkCount=' + chunkCount)

    if (fullContent) {
      updateStatusBadge('成功', '#16a34a')
      addSSELine('done', `━━━ 流式完成: ${chunkCount} chunks, ${fullContent.length} 字 ━━━`)
    } else {
      updateStatusBadge('空响应', '#d97706')
      streamMsg.div.innerHTML = '<span style="color:#888">(空响应)</span>'
    }

  } catch (e) {
    updateStatusBadge('网络错误', '#dc2626')
    addSSELine('error', `fetch error: ${e.message}`)
    streamMsg.div.remove()
    addChatMsg('error', e.message)
  } finally {
    isSending = false
    document.getElementById('sendBtn').disabled = false
    input.focus()
    const statsLog = document.getElementById('statsLog')
    statsLog.innerHTML += `<p style="margin:4px 0; color:#666">[${new Date().toLocaleTimeString()}] 请求#${reqIndex} 完成</p>`
    updateStats()
  }
}

// 服务器 SSE 日志轮询（从本地 sse-log 文件读取）
async function fetchSSELog() {
  try {
    const resp = await fetch('/debug/sse-log')
    if (!resp.ok) return
    const data = await resp.json()
    if (data && data.lines && data.lines.length > 0) {
      addSSELine('session', `[服务端日志] ${data.lines.length} 行`)
      let currentUrl = ''
      for (const line of data.lines) {
        // Extract URL from CHUNK: [CHUNK] [/api/...] data: ...
        const urlMatch = line.match(/^\[CHUNK\]\s+\[([^\]]+)\]/)
        if (urlMatch && urlMatch[1] !== currentUrl) {
          currentUrl = urlMatch[1]
          addSSELine('session', `📍 URL: ${currentUrl}`)
        }
        if (line.includes('SESSION')) addSSELine('session', '🖥 ' + line)
        else if (line.includes('PARSE-F1')) addSSELine('f1', '🖥 ' + line)
        else if (line.includes('PARSE-F2')) addSSELine('f2', '🖥 ' + line)
        else if (line.includes('PARSE-F3')) addSSELine('f3', '🖥 ' + line)
        else if (line.includes('PARSE-F4')) addSSELine('f4', '🖥 ' + line)
        else if (line.includes('PARSE-UNKNOWN')) addSSELine('unknown', '🖥 ' + line)
        else if (line.includes('RESULT')) addSSELine('done', '🖥 ' + line)
        else if (line.includes('CHUNK')) addSSELine('raw', '🖥 ' + line.slice(0, 200))
        else addSSELine('raw', '🖥 ' + line.slice(0, 100))
      }
    }
  } catch { /* ignore */ }
}

// 加载原始日志到 raw tab
let rawLogLoaded = false
async function fetchRawLog() {
  if (rawLogLoaded) return
  rawLogLoaded = true
  try {
    const resp = await fetch('/debug/raw-log')
    if (!resp.ok) return
    const data = await resp.json()
    if (data && data.lines && data.lines.length > 0) {
      addRawBlock(`=== 原始数据日志: ${data.file} (${data.lines.length} 行) ===`, true)
      for (const line of data.lines.slice(-500)) {
        addRawBlock(line, false)
      }
    } else {
      addRawBlock('暂无原始数据日志（请先发送请求）', true)
    }
  } catch {
    addRawBlock('加载原始日志失败', true)
  }
}
